<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trifecta Lead Board — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1419;
      color: #e7e9ea;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: #71767b; font-size: 0.85rem; margin-bottom: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1a2332;
      border: 1px solid #1e2d3d;
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label { font-size: 0.75rem; color: #71767b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 2rem; font-weight: 700; margin-top: 4px; }
    .stat-desc { font-size: 0.7rem; color: #536471; margin-top: 2px; }
    .hot-section {
      background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(249,115,22,0.05));
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .hot-title {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; font-size: 1.1rem; font-weight: 700;
    }
    .hot-badge {
      background: rgba(239,68,68,0.2); color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 999px; padding: 2px 10px; font-size: 0.75rem;
    }
    .hot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }
    .hot-card {
      background: rgba(26,35,50,0.8);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px; padding: 16px;
      transition: border-color 0.2s;
    }
    .hot-card:hover { border-color: rgba(239,68,68,0.4); }
    .hot-card .name { font-weight: 600; margin-bottom: 4px; }
    .hot-card .contact { font-size: 0.8rem; color: #71767b; }
    .hot-card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .hot-card .source-badge {
      font-size: 0.7rem; border: 1px solid rgba(239,68,68,0.2);
      border-radius: 4px; padding: 1px 6px; color: #71767b;
    }
    .hot-card .date { font-size: 0.7rem; color: #536471; }
    .hot-card .question { font-size: 0.75rem; color: #536471; margin-top: 8px; font-style: italic; }
    table {
      width: 100%; border-collapse: collapse;
      background: #1a2332; border-radius: 12px;
      overflow: hidden; border: 1px solid #1e2d3d;
    }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 0.75rem; color: #71767b; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid #1e2d3d;
    }
    td {
      padding: 10px 16px; font-size: 0.85rem;
      border-bottom: 1px solid #1e2d3d;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(15,20,25,0.5); }
    tr.hot-row { background: rgba(239,68,68,0.03); }
    tr.hot-row:hover { background: rgba(239,68,68,0.06); }
    .status-badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: 0.7rem; font-weight: 500; border: 1px solid;
    }
    .status-hot { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }
    .status-new { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.3); color: #22d3ee; }
    .status-contacted { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.3); color: #c084fc; }
    .status-inquiry { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: #60a5fa; }
    .status-draft { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); color: #fbbf24; }
    .status-sent { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: #34d399; }
    .status-review { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.3); color: #fb923c; }
    .status-closed { background: rgba(107,114,128,0.15); border-color: rgba(107,114,128,0.3); color: #9ca3af; }
    .status-error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }
    .source-badge {
      font-size: 0.7rem; border: 1px solid #1e2d3d;
      border-radius: 4px; padding: 1px 6px; color: #71767b;
    }
    .loading { text-align: center; padding: 48px; color: #71767b; }
    .error { text-align: center; padding: 48px; color: #f87171; }
    .refresh-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .refresh-bar .label { font-size: 0.85rem; color: #71767b; }
    .refresh-btn {
      background: #008B8B; color: white; border: none;
      padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
    }
    .refresh-btn:hover { background: #006666; }
    .filter-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar select, .filter-bar input {
      background: #1a2332; border: 1px solid #1e2d3d;
      color: #e7e9ea; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem;
    }
    .filter-bar input { width: 200px; }
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; padding: 16px; border-top: 1px solid #1e2d3d;
    }
    .pagination button {
      background: #1a2332; border: 1px solid #1e2d3d;
      color: #71767b; padding: 4px 12px; border-radius: 6px; cursor: pointer;
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination span { font-size: 0.8rem; color: #71767b; }
    .last-update { font-size: 0.7rem; color: #536471; }
  </style>
</head>
<body>
  <h1>🐑 Trifecta Lead Board</h1>
  <p class="subtitle">Live data from lead_pipeline.db — auto-refreshes every 30s • <span class="last-update" id="last-update"></span></p>

  <div id="stats" class="stats-grid"><div class="loading">Loading stats...</div></div>
  <div id="hot-leads"></div>

  <div class="filter-bar">
    <input type="text" id="search" placeholder="🔍 Search by name..." oninput="applyFilters()">
    <select id="status-filter" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="hot">🔥 Hot</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="INQUIRY_RECEIVED">Inquiry</option>
      <option value="DRAFT_CREATED">Draft Ready</option>
      <option value="NEEDS_HUMAN_REVIEW">Needs Review</option>
      <option value="PROGRAM_INFO_SENT">Sent</option>
      <option value="closed">Closed</option>
    </select>
    <select id="source-filter" onchange="applyFilters()">
      <option value="">All sources</option>
    </select>
  </div>

  <div class="refresh-bar">
    <span class="label" id="showing-label">All Leads</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
  <div id="lead-table"><div class="loading">Loading leads...</div></div>

  <script>
    const CC_PORT = 3000;
    const CC_BASE = `http://localhost:${CC_PORT}`;

    async function trpcGet(proc, input) {
      try {
        let url = `${CC_BASE}/api/trpc/${proc}`;
        if (input) url += `?input=${encodeURIComponent(JSON.stringify({ json: input }))}`;
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        return json.result?.data?.json || json.result?.data;
      } catch (err) {
        console.error(`tRPC ${proc} failed:`, err);
        return null;
      }
    }

    function statusClass(s) {
      const map = {
        hot: 'status-hot', new: 'status-new', contacted: 'status-contacted',
        INQUIRY_RECEIVED: 'status-inquiry', DRAFT_CREATED: 'status-draft',
        PROGRAM_INFO_SENT: 'status-sent', NEEDS_HUMAN_REVIEW: 'status-review',
        closed: 'status-closed', ARCHIVED: 'status-closed', ERROR: 'status-error',
      };
      return map[s] || 'status-inquiry';
    }

    function statusLabel(s) {
      const map = {
        hot: '🔥 Hot', new: 'New', contacted: 'Contacted',
        INQUIRY_RECEIVED: 'Inquiry', DRAFT_CREATED: 'Draft Ready',
        PROGRAM_INFO_SENT: 'Sent', NEEDS_HUMAN_REVIEW: 'Review',
        closed: 'Closed', ARCHIVED: 'Archived', ERROR: 'Error',
      };
      return map[s] || s;
    }

    function fmtDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-CA');
    }

    let allLeads = [];
    let filteredLeads = [];
    let currentPage = 0;
    const PAGE_SIZE = 50;

    function renderStats(stats, leads) {
      const total = stats?.total || leads.length;
      const newToday = stats?.newToday || 0;
      const hotCount = stats?.hotLeads || leads.filter(l => l.status === 'hot').length;
      const sources = {};
      leads.forEach(l => { sources[l.source] = (sources[l.source] || 0) + 1; });
      const topSource = Object.entries(sources).sort((a,b) => b[1] - a[1])[0];

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Leads</div>
          <div class="stat-value" style="color:#008B8B">${total}</div>
          <div class="stat-desc">All time pipeline</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">New Today</div>
          <div class="stat-value" style="color:#3b82f6">${newToday}</div>
          <div class="stat-desc">Added today</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Hot Leads</div>
          <div class="stat-value" style="color:#ef4444">${hotCount}</div>
          <div class="stat-desc">Ready to convert</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Top Source</div>
          <div class="stat-value" style="color:#a855f7;font-size:1.2rem">${topSource ? topSource[0] : '—'}</div>
          <div class="stat-desc">${topSource ? topSource[1] + ' leads' : ''}</div>
        </div>
      `;
    }

    function renderHotLeads(leads) {
      const hot = leads.filter(l => l.status === 'hot');
      if (hot.length === 0) { document.getElementById('hot-leads').innerHTML = ''; return; }
      document.getElementById('hot-leads').innerHTML = `
        <div class="hot-section">
          <div class="hot-title">🔥 HOT LEADS <span class="hot-badge">${hot.length}</span></div>
          <div class="hot-grid">
            ${hot.map(l => `
              <div class="hot-card">
                <div class="name">🔥 ${l.name || 'Unknown'}</div>
                <div class="contact">${l.email || l.phone || 'No contact info'}</div>
                <div class="meta">
                  <span class="source-badge">${l.source}</span>
                  <span class="date">${fmtDate(l.created_at)}</span>
                </div>
                ${l.initial_question ? `<div class="question">"${l.initial_question.slice(0, 120)}"</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function populateSourceFilter(leads) {
      const sources = [...new Set(leads.map(l => l.source))].sort();
      const sel = document.getElementById('source-filter');
      sel.innerHTML = '<option value="">All sources</option>' +
        sources.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('status-filter').value;
      const source = document.getElementById('source-filter').value;
      filteredLeads = allLeads.filter(l => {
        if (search && !(l.name || '').toLowerCase().includes(search) && !(l.email || '').toLowerCase().includes(search)) return false;
        if (status && l.status !== status) return false;
        if (source && l.source !== source) return false;
        return true;
      });
      currentPage = 0;
      renderTable(filteredLeads);
    }

    function renderTable(leads) {
      const start = currentPage * PAGE_SIZE;
      const pageLeads = leads.slice(start, start + PAGE_SIZE);
      const totalPages = Math.ceil(leads.length / PAGE_SIZE);

      document.getElementById('showing-label').textContent =
        `Showing ${leads.length > 0 ? start + 1 : 0}–${Math.min(start + PAGE_SIZE, leads.length)} of ${leads.length} leads`;

      document.getElementById('lead-table').innerHTML = leads.length === 0
        ? '<div class="loading">No leads match your filters.</div>'
        : `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Contact</th>
              <th>Source</th>
              <th>Status</th>
              <th>Program</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody>
            ${pageLeads.map(l => `
              <tr class="${l.status === 'hot' ? 'hot-row' : ''}">
                <td>${l.status === 'hot' ? '🔥 ' : ''}${l.name || '—'}</td>
                <td>${l.email || l.phone || '—'}</td>
                <td><span class="source-badge">${l.source}</span></td>
                <td><span class="status-badge ${statusClass(l.status)}">${statusLabel(l.status)}</span></td>
                <td>${l.program_interest || '—'}</td>
                <td>${fmtDate(l.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        ${totalPages > 1 ? `
          <div class="pagination">
            <button ${currentPage === 0 ? 'disabled' : ''} onclick="currentPage--;renderTable(filteredLeads)">← Prev</button>
            <span>${currentPage + 1} / ${totalPages}</span>
            <button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="currentPage++;renderTable(filteredLeads)">Next →</button>
          </div>
        ` : ''}
      `;
    }

    async function loadAll() {
      const [statsData, queryData] = await Promise.all([
        trpcGet('leadDb.stats'),
        trpcGet('leadDb.query', { limit: 500, offset: 0 }),
      ]);

      if (queryData && queryData.leads) {
        allLeads = queryData.leads;
        filteredLeads = [...allLeads];
        renderStats(statsData, allLeads);
        renderHotLeads(allLeads);
        populateSourceFilter(allLeads);
        applyFilters();
        document.getElementById('last-update').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
      } else {
        document.getElementById('lead-table').innerHTML = `
          <div class="error">
            Could not load leads.<br>
            Make sure the Command Center is running on port ${CC_PORT}.<br>
            <button class="refresh-btn" style="margin-top:12px" onclick="loadAll()">↻ Retry</button>
          </div>
        `;
      }
    }

    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
